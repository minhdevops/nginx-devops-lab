{{- if and .Values.nginxDemo.enabled .Values.nginxDemo.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-nginx-demo
spec:
  ingressClassName: {{ .Values.nginxDemo.ingress.className }}
  rules:
    - host: {{ .Values.nginxDemo.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.nginxDemo.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-nginx-demo
                port:
                  number: {{ .Values.nginxDemo.service.port }}
{{- end }}

