{{- if .Values.nginxDemo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-nginx-demo
  labels:
    app.kubernetes.io/name: nginx-demo
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.nginxDemo.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-demo
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-demo
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.nginxDemo.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nginx-demo
          image: "{{ .Values.nginxDemo.image.repository }}:{{ .Values.nginxDemo.image.tag }}"
          imagePullPolicy: {{ .Values.nginxDemo.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.nginxDemo.containerPort }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.nginxDemo.resources | nindent 12 }}
{{- end }}

